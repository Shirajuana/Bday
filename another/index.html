<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Envelope Screen -->
    <div id="envelope-screen" class="screen active">
        <div class="env-particles" id="env-particles"></div>
        <div class="envelope-scene">
            <p class="pre-label">A Special Delivery For</p>
            <h1 class="recipient-name">Wyatt Neil-Albert M. Dadia</h1>
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope" id="envelope">
                    <!-- Flap -->
                    <div class="env-flap" id="env-flap">
                        <div class="flap-seal">
                            <div class="seal-ring">
                                <span class="seal-text">W</span>
                            </div>
                        </div>
                    </div>
                    <!-- Envelope body -->
                    <div class="env-body">
                        <div class="env-left-fold"></div>
                        <div class="env-right-fold"></div>
                        <div class="env-bottom-fold"></div>
                        <div class="env-center">
                            <button class="open-btn" id="open-btn">
                                <span class="btn-text">Open</span>
                                <span class="btn-glow"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="from-label">From: Sheila </div>
        </div>
    </div>

    <!-- Cake Screen -->
    <div id="cake-screen" class="screen">
        <!-- Ambient background layers -->
        <div class="bg-gradient"></div>
        <div class="bg-vignette"></div>
        <div class="stars-layer" id="stars-layer"></div>
        <div class="particles-layer" id="particles-layer"></div>
        <div class="confetti-layer" id="confetti-layer"></div>

        <!-- Spotlight -->
        <div class="spotlight" id="spotlight"></div>

        <!-- Countdown -->
        <div class="countdown-wrap" id="countdown-wrap">
            <div class="countdown-label">Blow your candles in</div>
            <div class="countdown-number" id="countdown-number"></div>
        </div>

        <!-- Make a wish -->
        <div class="wish-text" id="wish-text">Make a Wish ✨</div>

        <!-- Final reveal -->
        <div class="final-reveal" id="final-reveal">
            <div class="reveal-title">Happy 20th Birthday</div>
            <div class="reveal-name">Wyatt Neil-Albert M. Dadia</div>
        </div>

        <!-- Floating spheres -->
        <div class="spheres-wrap">
            <div class="sphere s1"></div>
            <div class="sphere s2"></div>
            <div class="sphere s3"></div>
            <div class="sphere s4"></div>
            <div class="sphere s5"></div>
            <div class="sphere s6"></div>
        </div>

        <!-- Music control -->
        <button class="music-btn" id="music-btn" title="Toggle Music">
            <span class="music-icon" id="music-icon">♪</span>
        </button>

        <!-- THE CAKE -->
        <div class="scene" id="cake-scene">

            <!-- Candles -->
            <div class="candles-row">
                <div class="candle c1">
                    <div class="flame-wrap"><div class="flame f1"><div class="flame-core"></div></div><div class="smoke" id="smoke1"></div></div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c2">
                    <div class="flame-wrap"><div class="flame f2"><div class="flame-core"></div></div><div class="smoke" id="smoke2"></div></div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c3">
                    <div class="flame-wrap"><div class="flame f3"><div class="flame-core"></div></div><div class="smoke" id="smoke3"></div></div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c4">
                    <div class="flame-wrap"><div class="flame f4"><div class="flame-core"></div></div><div class="smoke" id="smoke4"></div></div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c5">
                    <div class="flame-wrap"><div class="flame f5"><div class="flame-core"></div></div><div class="smoke" id="smoke5"></div></div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
            </div>

            <!-- Top tier -->
            <div class="tier tier-top">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls top-pearls"></div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Middle tier -->
            <div class="tier tier-mid">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls mid-pearls"></div>
                    <div class="tier-msg">Happy Birthday</div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Money pull zone -->
            <div class="money-zone">
                <div class="money-ribbon" id="money-ribbon">
                    <div class="ribbon-bills" id="ribbon-bills"></div>
                    <div class="ribbon-slot" id="ribbon-slot">
                        <button class="slot-button" id="slot-button" type="button">✦ CLICK ✦</button>
                    </div>
                </div>
            </div>

            <!-- Bottom tier -->
            <div class="tier tier-bot">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls bot-pearls"></div>
                    <div class="bot-decoration">
                        <span>✦</span><span>20</span><span>✦</span>
                    </div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Plate -->
            <div class="cake-board">
                <div class="board-shine"></div>
            </div>
        </div>

    </div>

    <audio id="birthday-music" preload="auto">
        <source src="bday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
