<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="cake.jpg">
    <title>Happy Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Dancing+Script:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Envelope Screen -->
    <div id="envelope-screen" class="screen active">
        <div class="env-particles" id="env-particles"></div>
        <div class="envelope-scene">
            <p class="pre-label">A Special Delivery For</p>
            <h1 class="recipient-name">You</h1>
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope" id="envelope">
                    <!-- Flap -->
                    <div class="env-flap" id="env-flap">
                        <div class="flap-seal">
                            <div class="seal-ring">
                                <span class="seal-text">W</span>
                            </div>
                        </div>
                    </div>

                    <!-- Envelope body -->
                    <div class="env-body">
                        <div class="env-left-fold"></div>
                        <div class="env-right-fold"></div>
                        <div class="env-bottom-fold"></div>
                        <div class="env-center">
                            <button class="open-btn" id="open-btn">
                                <span class="btn-text">Open</span>
                                <span class="btn-glow"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="from-label">From: Me</div>
        </div>
    </div>

    <!-- Cake Screen -->
    <div id="cake-screen" class="screen">
        <!-- Ambient background layers -->
        <div class="bg-gradient"></div>
        <div class="bg-vignette"></div>
        <div class="stars-layer" id="stars-layer"></div>
        <div class="particles-layer" id="particles-layer"></div>
        <div class="confetti-layer" id="confetti-layer"></div>
        <div class="fireworks-container" id="fireworks-container"></div>

        <!-- Spotlight -->
        <div class="spotlight" id="spotlight"></div>

        <!-- Countdown -->
        <div class="countdown-wrap" id="countdown-wrap">
            <div class="countdown-label">Blow your candles in</div>
            <div class="countdown-number" id="countdown-number"></div>
        </div>

        <!-- Make a wish -->
        <div class="wish-text" id="wish-text">✨ Make a Wish ✨</div>

        <!-- Top reveal (shown above cake after candles blow) -->

        <div class="final-reveal" id="final-reveal">
            <div class="reveal-subtitle">Wishing you the most wonderful day!</div>
            <div class="reveal-title">Happy Birthday to</div>
            <div class="reveal-name">You</div>
            <div class="reveal-divider"><span>✦</span><span>✦</span><span>✦</span></div>
        </div>

        <!-- Floating spheres -->
        <div class="spheres-wrap">
            <div class="sphere s1"></div>
            <div class="sphere s2"></div>
            <div class="sphere s3"></div>
            <div class="sphere s4"></div>
            <div class="sphere s5"></div>
            <div class="sphere s6"></div>
        </div>

        <!-- Music control -->
        <button class="music-btn" id="music-btn" title="Toggle Music">
            <span class="music-icon" id="music-icon">♪</span>
        </button>

        <!-- THE CAKE -->
        <div class="scene" id="cake-scene">

            <!-- Reusable SVG Defs -->
            <svg style="width:0;height:0;position:absolute;" aria-hidden="true">
                <defs>
                    <linearGradient id="gold-drip" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#fffed6" />
                        <stop offset="20%" stop-color="#f5e27a" />
                        <stop offset="60%" stop-color="#d4af37" />
                        <stop offset="100%" stop-color="#9a7b1e" />
                    </linearGradient>
                    <pattern id="drip-pattern" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
                        <path fill="url(#gold-drip)"
                            d="M0,0 L80,0 L80,3 Q78,3 78,15 Q78,20 75,20 Q72,20 72,15 Q72,3 70,3 Q68,3 68,28 Q68,34 65,34 Q62,34 62,28 Q62,3 60,3 Q58,3 58,10 Q58,14 55,14 Q52,14 52,10 Q52,3 50,3 Q48,3 48,22 Q48,28 45,28 Q42,28 42,22 Q42,3 40,3 Q38,3 38,32 Q38,38 35,38 Q32,38 32,32 Q32,3 30,3 Q28,3 28,14 Q28,18 25,18 Q22,18 22,14 Q22,3 20,3 Q18,3 18,25 Q18,31 15,31 Q12,31 12,25 Q12,3 10,3 Q8,3 8,12 Q8,16 5,16 Q2,16 2,12 Q2,3 0,3 Z" />
                    </pattern>

                    <filter id="flower-shadow">
                        <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="rgba(0,0,0,0.4)" />
                    </filter>
                </defs>
            </svg>

            <!-- Candles -->
            <div class="candles-row">
                <div class="candle c1">
                    <div class="flame-wrap">
                        <div class="flame f1">
                            <div class="flame-core"></div>
                        </div>
                        <div class="smoke" id="smoke1"></div>
                    </div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c2">
                    <div class="flame-wrap">
                        <div class="flame f2">
                            <div class="flame-core"></div>
                        </div>
                        <div class="smoke" id="smoke2"></div>
                    </div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c3">
                    <div class="flame-wrap">
                        <div class="flame f3">
                            <div class="flame-core"></div>
                        </div>
                        <div class="smoke" id="smoke3"></div>
                    </div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c4">
                    <div class="flame-wrap">
                        <div class="flame f4">
                            <div class="flame-core"></div>
                        </div>
                        <div class="smoke" id="smoke4"></div>
                    </div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
                <div class="candle c5">
                    <div class="flame-wrap">
                        <div class="flame f5">
                            <div class="flame-core"></div>
                        </div>
                        <div class="smoke" id="smoke5"></div>
                    </div>
                    <div class="wick"></div>
                    <div class="candle-rod"></div>
                </div>
            </div>

            <!-- Top tier -->
            <div class="tier tier-top">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="drips-wrap">
                        <svg width="100%" height="100%">
                            <rect width="100%" height="100%" fill="url(#drip-pattern)" />
                        </svg>
                    </div>
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls top-pearls"></div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Middle tier -->
            <div class="tier tier-mid">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="drips-wrap">
                        <svg width="100%" height="100%">
                            <rect width="100%" height="100%" fill="url(#drip-pattern)" />
                        </svg>
                    </div>
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls mid-pearls"></div>
                    <div class="tier-msg">Happy Birthday</div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Bottom tier -->
            <div class="tier tier-bot">
                <div class="tier-lid"></div>
                <div class="tier-side">
                    <div class="drips-wrap">
                        <svg width="100%" height="100%">
                            <rect width="100%" height="100%" fill="url(#drip-pattern)" />
                        </svg>
                    </div>
                    <div class="tier-texture"></div>
                    <div class="tier-band"></div>
                    <div class="tier-pearls bot-pearls"></div>
                    <div class="bot-decoration">
                        <span>✦</span><span></span><span>✦</span>
                    </div>
                </div>
                <div class="tier-rim"></div>
            </div>

            <!-- Plate -->
            <div class="cake-board">
                <div class="board-shine"></div>
            </div>

        </div>

    </div>

    <audio id="birthday-music" preload="auto">
        <source src="bday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>

</html>
