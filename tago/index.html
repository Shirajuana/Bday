<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Wyatt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Envelope Screen -->
    <div id="envelope-screen" class="screen active">
        <div class="envelope-container">
            <div class="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body">
                    <div class="envelope-shine"></div>
                    <button id="open-btn" class="open-button">Open</button>
                </div>
                <div class="envelope-bottom">
                    <p class="envelope-to">To: Wyatt Neil-Albert M. Dadia</p>
                    <p class="envelope-from">From: Sheila</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Birthday Cake Screen -->
    <div id="cake-screen" class="screen">
        <div class="background-container">
            <div class="stars-container" id="stars-container"></div>
            <div class="fireflies-container" id="fireflies-container"></div>
        </div>
        
        <div class="cake-container">
            <div id="countdown-text" class="countdown-text"></div>
            
            <!-- Gold Spheres -->
            <div class="gold-spheres">
                <div class="sphere sphere-1"></div>
                <div class="sphere sphere-2"></div>
                <div class="sphere sphere-3"></div>
                <div class="sphere sphere-4"></div>
                <div class="sphere sphere-5"></div>
                <div class="sphere sphere-6"></div>
                <div class="sphere sphere-7"></div>
                <div class="sphere sphere-8"></div>
            </div>
            
            <div class="cake">
                <!-- Candles -->
                <div class="candles">
                    <div class="candle">
                        <div class="flame"></div>
                        <div class="wick"></div>
                        <div class="candle-body"></div>
                    </div>
                    <div class="candle candle-2">
                        <div class="flame"></div>
                        <div class="wick"></div>
                        <div class="candle-body"></div>
                    </div>
                    <div class="candle candle-3">
                        <div class="flame"></div>
                        <div class="wick"></div>
                        <div class="candle-body"></div>
                    </div>
                </div>

                <!-- Top Tier -->
                <div class="tier tier-top">
                    <div class="tier-top-surface"></div>
                    <div class="tier-body"></div>
                    <div class="tier-decoration"></div>
                </div>

                <!-- Middle Tier -->
                <div class="tier tier-middle">
                    <div class="tier-top-surface"></div>
                    <div class="tier-body"></div>
                    <div class="tier-decoration"></div>
                </div>

                <!-- Bottom Tier -->
                <div class="tier tier-bottom">
                    <div class="tier-top-surface"></div>
                    <div class="tier-body">
                        <div class="cake-message">Happy Birthday</div>
                    </div>
                    
                    <div class="tier-decoration"></div>
                </div>

                <!-- Cake Plate -->
                <div class="cake-plate"></div>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="birthday-music" preload="auto">
        <source src="bday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
